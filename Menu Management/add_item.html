<!DOCTYPE html>
<html>
<head>
    <title>Add Menu Item</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        form { width: 500px; }
        label { display: block; margin-top: 10px; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; }
        button { background: green; color: white; padding: 10px; margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Add New Menu Item</h1>
     <!-- Form submits to /admin/menu/add route -->
    <form method="POST">
        <!-- Menu item name field -->
        <label>Name:</label>
        <input type="text" name="name" required>
        
         <!-- Price for Small size (stored in øre, e.g., 2900 = 29.00 DKK) -->
        <label>Price (Small) in øre (e.g., 2900 = 29.00 kr):</label>
        <input type="number" name="price_sm" required>
        

        <!-- Price for Regular size (stored in øre) -->
        <label>Price (Regular) in øre:</label>
        <input type="number" name="price_reg" required>
        

        <!-- Price for Large size (stored in øre) -->
        <label>Price (Large) in øre:</label>
        <input type="number" name="price_lg" required>

        <!-- Category dropdown - matches the three categories from PDF menu -->
        <label>Category:</label>
        <select name="category">
            <option>Fresh Fruit Juices</option>
            <option>Sugarcane Juice</option>
            <option>Smoothies & Shakes</option>
        </select>
        
        <!-- Checkbox for vegan items -->
        <label>
            <input type="checkbox" name="is_vegan"> Vegan
        </label>


        <!-- Submit button to add the new menu item -->
        <button type="submit">Add Item</button>
    </form>

     <!-- Link to go back to admin menu list -->
    <a href="/admin">Back to Admin</a>
</body>
</html>
