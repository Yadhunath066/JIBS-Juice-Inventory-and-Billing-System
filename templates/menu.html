<body>

    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="Sip & Go Logo">
            <h3>Sip & Go Junction</h3>
        </div>
        <!-- Sidebar navigation links -->
        <a href="/main_menu"><i class="fas fa-home"></i> Main Menu</a>
        <a href="/menu"><i class="fas fa-utensils"></i> Menu</a>
        <!-- Cart link with badge showing item count -->
        <a href="/cart" class="cart-link"><i class="fas fa-shopping-cart"></i> Cart <span id="cartCount" class="badge-count" style="display: none;">0</span></a>
        <a href="/order_history"><i class="fas fa-history"></i> Orders</a>
        <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>

    <div class="main-content">
        <h1>Our Menu</h1>

        <!-- Loop through each category -->
        {% for category, items in menu.items() %}
        <div class="category">
            <h2><i class="fas fa-leaf" style="color: #1abc9c; margin-right: 10px;"></i> {{ category }}</h2>
            <div class="menu-grid">
                <!-- Loop through each item in category -->
                {% for item in items %}
                <div class="menu-card">
                    <h3>{{ item.name }}</h3>
                    <!-- AJAX form - submits without page reload -->
                    <form class="add-to-cart-form" data-item-name="{{ item.name }}">
                        <input type="hidden" name="item_name" value="{{ item.name }}">
                        <input type="hidden" name="size" class="size-hidden-input" value="">

                        <!-- Size options -->
                        <div class="sizes">
                            {% for size, price in item.prices.items() %}
                            <div class="size-option" data-size="{{ size }}">
                                <div class="size-name">{{ size }}</div>
                                <div class="size-price">{{ "%.2f"|format(price / 100) }} kr</div>
                            </div>
                            {% endfor %}
                        </div>

                        <div class="add-section">
                            <input type="number" name="quantity" value="1" min="1" class="qty-input">
                            <button type="submit"><i class="fas fa-cart-plus"></i> Add to Cart</button>
                        </div>
                    </form>
                </div>
                {% endfor %}
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        // Show popup message when item added to cart
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast-notification ${type}`;
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        // Update the red badge with cart item count
        function updateCartCount() {
            fetch('/cart_count')
                .then(response => response.json())
                .then(data => {
                    const countElement = document.getElementById('cartCount');
                    if (data.count > 0) {
                        countElement.textContent = data.count;
                        countElement.style.display = 'inline-block';
                    } else {
                        countElement.style.display = 'none';
                    }
                });
        }

        // Size selection - click to select Sm, Reg, or Lg
        document.querySelectorAll('.sizes').forEach(container => {
            const form = container.closest('form');
            const sizeInput = form.querySelector('.size-hidden-input');

            container.querySelectorAll('.size-option').forEach(option => {
                option.addEventListener('click', function() {
                    container.querySelectorAll('.size-option').forEach(opt => {
                        opt.classList.remove('selected');
                    });
                    this.classList.add('selected');
                    sizeInput.value = this.dataset.size;
                });
            });
        });

        // AJAX Add to Cart - no page reload
        document.querySelectorAll('.add-to-cart-form').forEach(form => {
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const sizeInput = this.querySelector('.size-hidden-input');
                const selectedSize = sizeInput.value;
                
                // Validate size selection
                if (!selectedSize) {
                    showToast('Please select a size (Sm, Reg, or Lg)', 'error');
                    return;
                }
                
                const formData = new FormData(this);
                
                try {
                    const response = await fetch('/add_to_cart', {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        showToast(result.message, 'success');
                        updateCartCount();
                        // Reset quantity to 1 after adding
                        this.querySelector('.qty-input').value = 1;
                    } else {
                        showToast(result.error, 'error');
                    }
                } catch (error) {
                    showToast('Error adding to cart', 'error');
                }
            });
        });

        // Get cart count when page loads
        updateCartCount();
    </script>

</body>
</html>
