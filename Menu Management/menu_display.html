<!DOCTYPE html>
<html>
<head>
    <title>Sip & Go Junction - Menu</title>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #1abc9c, #2c3e50);
            color: white;
            border-radius: 20px;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .category {
            background: white;
            border-radius: 20px;
            margin-bottom: 30px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .category h2 {
            color: #2c3e50;
            border-left: 5px solid #1abc9c;
            padding-left: 15px;
            margin-bottom: 20px;
        }
        
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .menu-item {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 15px;
            transition: transform 0.3s;
        }
        
        .menu-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }
        
        .item-name {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #1abc9c;
        }
        
        .sizes {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }
        
        .size-card {
            flex: 1;
            text-align: center;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }
        
        .size-name {
            font-size: 14px;
            color: #7f8c8d;
        }
        
        .size-price {
            font-size: 18px;
            font-weight: bold;
            color: #1abc9c;
        }
        
        .vegan-badge {
            display: inline-block;
            background: #27ae60;
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 10px;
        }
        
        @media (max-width: 768px) {
            .menu-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🥤 Sip & Go Junction</h1>
        <p>Fresh. Natural. No preservatives. Made to order.</p>
    </div>
    
    <div id="menu-container"></div>

    <script>
        async function loadMenu() {
            try {
                const response = await fetch('/api/menu_items');
                const items = await response.json();
                
                const categories = {};
                items.forEach(item => {
                    if (!categories[item.category]) {
                        categories[item.category] = [];
                    }
                    categories[item.category].push(item);
                });
                
                const container = document.getElementById('menu-container');
                container.innerHTML = '';
                
                for (const [category, menuItems] of Object.entries(categories)) {
                    const categoryDiv = document.createElement('div');
                    categoryDiv.className = 'category';
                    categoryDiv.innerHTML = `<h2>${category}</h2><div class="menu-grid"></div>`;
                    
                    const gridDiv = categoryDiv.querySelector('.menu-grid');
                    
                    menuItems.forEach(item => {
                        const itemDiv = document.createElement('div');
                        itemDiv.className = 'menu-item';
                        itemDiv.innerHTML = `
                            <div class="item-name">
                                ${item.name}
                                ${item.vegan ? '<span class="vegan-badge">Vegan</span>' : ''}
                            </div>
                            <div class="sizes">
                                <div class="size-card">
                                    <div class="size-name">Small</div>
                                    <div class="size-price">${(item.sizes.Sm / 100).toFixed(2)} kr</div>
                                </div>
                                <div class="size-card">
                                    <div class="size-name">Regular</div>
                                    <div class="size-price">${(item.sizes.Reg / 100).toFixed(2)} kr</div>
                                </div>
                                <div class="size-card">
                                    <div class="size-name">Large</div>
                                    <div class="size-price">${(item.sizes.Lg / 100).toFixed(2)} kr</div>
                                </div>
                            </div>
                        `;
                        gridDiv.appendChild(itemDiv);
                    });
                    
                    container.appendChild(categoryDiv);
                }
            } catch (error) {
                console.error('Error loading menu:', error);
            }
        }
        
        loadMenu();
    </script>
</body>
</html>
