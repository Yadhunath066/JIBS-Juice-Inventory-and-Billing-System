<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - Menu Management</title>
    <style>
        /* Gradient background - dark blue to green */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #2c3e50, #1abc9c);
            margin: 0;
        }
        /* White card in center */
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
        }
        /* Input fields - full width with rounded corners */
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }
        /* Login button - green */
        button {
            background: #1abc9c;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
        button:hover {
            background: #16a085;
        }
        /* Error message - red text */
        .error {
            color: #e74c3c;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Menu Management Login</h2>
        <p>JIBS Juice Bar</p>
        <!-- Display error message if login fails -->
        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
        <!-- Login form - submits to /admin/login route -->
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
