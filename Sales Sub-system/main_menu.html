<!DOCTYPE html>
<html>
<head>
    <title>Main Menu - JIBS</title>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <!-- Poppins font for modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            /* Animated gradient background */
            background: linear-gradient(135deg, #1abc9c, #2c3e50, #16a085);
            background-size: 200% 200%;
            animation: gradientMove 10s ease infinite;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Background color transition animation */
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* White dashboard card in center */
        .dashboard {
            background: white;
            border-radius: 30px;
            padding: 40px;
            width: 500px;
            max-width: 100%;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            animation: fadeInUp 0.6s ease-out;
        }

        /* Fade in animation */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Company logo */
        .logo {
            width: 100px;
            margin-bottom: 20px;
        }

        /* Company name */
        h1 {
            color: #2c3e50;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        /* Welcome message with cashier name */
        .greeting {
            background: #ecf0f1;
            display: inline-block;
            padding: 8px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .greeting i {
            color: #1abc9c;
            margin-right: 8px;
        }

        /* Three menu cards in a row */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        /* Individual menu card */
        .menu-card {
            background: #f8f9fa;
            padding: 20px 10px;
            border-radius: 15px;
            text-decoration: none;
            color: #2c3e50;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #e9ecef;
        }

        /* Hover effect - card lifts and turns green */
        .menu-card:hover {
            background: #1abc9c;
            color: white;
            transform: translateY(-5px);
            border-color: #1abc9c;
        }

        /* Icon inside menu card */
        .menu-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .menu-card span {
            font-size: 13px;
            font-weight: 500;
        }

        /* Logout button */
        .logout {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logout:hover {
            background: #c0392b;
            transform: scale(1.02);
        }

        /* Responsive for small screens */
        @media (max-width: 500px) {
            .dashboard { padding: 25px; }
            .menu-grid { gap: 10px; }
            .menu-card { padding: 15px 5px; }
            .menu-icon { font-size: 24px; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Company logo -->
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Sip & Go Logo" class="logo">
        <h1>Sip & Go Junction</h1>
        <!-- Welcome message - shows cashier name from session -->
        <div class="greeting">
            <i class="fas fa-user-check"></i> Welcome, {{ staff_name }}!
        </div>

        <!-- Navigation cards -->
        <div class="menu-grid">
            <a href="/menu" class="menu-card">
                <div class="menu-icon"><i class="fas fa-utensils"></i></div>
                <span>Menu</span>
            </a>
            <a href="/cart" class="menu-card">
                <div class="menu-icon"><i class="fas fa-shopping-cart"></i></div>
                <span>Cart</span>
            </a>
            <a href="/order_history" class="menu-card">
                <div class="menu-icon"><i class="fas fa-clock"></i></div>
                <span>Orders</span>
            </a>
        </div>

        <!-- Logout form -->
        <form action="/logout" method="GET">
            <button type="submit" class="logout">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </form>
    </div>
</body>
</html>
